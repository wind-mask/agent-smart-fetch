name: Publish packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Which package(s) to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - pi
          - openclaw
      dry_run:
        description: "Dry run only"
        required: true
        default: false
        type: boolean

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Verify publish toolchain
        run: |
          node --version
          npm --version
          bun --version
          node -e "const { execSync } = require('node:child_process'); const [major, minor, patch] = execSync('npm --version', { encoding: 'utf8' }).trim().split('.').map(Number); if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) throw new Error('npm 11.5.1+ required for Trusted Publishing');"

      - name: Install dependencies
        run: bun install

      - name: Verify versions match tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          test "$(node -p "require('./package.json').version")" = "$TAG_VERSION"
          test "$(node -p "require('./packages/core/package.json').version")" = "$TAG_VERSION"
          test "$(node -p "require('./packages/pi-smart-fetch/package.json').version")" = "$TAG_VERSION"
          test "$(node -p "require('./packages/openclaw-smart-fetch/package.json').version")" = "$TAG_VERSION"
          test "$(node -p "require('./packages/openclaw-smart-fetch/openclaw.plugin.json').version")" = "$TAG_VERSION"

      - name: Verify workspace
        run: bun run check

      - name: Package dry runs
        run: bun run pack:dry-run:all

      - name: Publish selected package(s)
        env:
          NPM_CONFIG_PROVENANCE: true
          SELECTED_PACKAGE: ${{ github.event.inputs.package || 'all' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          publish_cmd() {
            local workspace="$1"
            if [ "$DRY_RUN" = "true" ]; then
              npm publish --workspace "$workspace" --access public --provenance --dry-run
            else
              npm publish --workspace "$workspace" --access public --provenance
            fi
          }

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            publish_cmd packages/pi-smart-fetch
            publish_cmd packages/openclaw-smart-fetch
            exit 0
          fi

          case "$SELECTED_PACKAGE" in
            all)
              publish_cmd packages/pi-smart-fetch
              publish_cmd packages/openclaw-smart-fetch
              ;;
            pi)
              publish_cmd packages/pi-smart-fetch
              ;;
            openclaw)
              publish_cmd packages/openclaw-smart-fetch
              ;;
            *)
              echo "Unknown package selection: $SELECTED_PACKAGE" >&2
              exit 1
              ;;
          esac
