name: Publish packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Which package(s) to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - pi
          - openclaw
      dry_run:
        description: "Dry run only"
        required: true
        default: false
        type: boolean

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify versions match tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          test "$(node -p "require('./package.json').version")" = "$TAG_VERSION"
          test "$(node -p "require('./packages/core/package.json').version")" = "$TAG_VERSION"
          test "$(node -p "require('./packages/pi-smart-fetch/package.json').version")" = "$TAG_VERSION"
          test "$(node -p "require('./packages/openclaw-smart-fetch/package.json').version")" = "$TAG_VERSION"
          test "$(node -p "require('./packages/openclaw-smart-fetch/openclaw.plugin.json').version")" = "$TAG_VERSION"

      - name: Verify workspace
        run: bun run check

      - name: Package dry runs
        run: bun run pack:dry-run:all

      - name: Setup npm auth
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: https://registry.npmjs.org

      - name: Publish selected package(s)
        env:
          SELECTED_PACKAGE: ${{ github.event.inputs.package || 'all' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            cd packages/pi-smart-fetch && npx npm publish --access public ${{ env.DRY_RUN == 'true' && '--dry-run' || '' }}
            cd ../openclaw-smart-fetch && npx npm publish --access public ${{ env.DRY_RUN == 'true' && '--dry-run' || '' }}
            exit 0
          fi

          case "$SELECTED_PACKAGE" in
            all)
              cd packages/pi-smart-fetch && npx npm publish --access public ${{ env.DRY_RUN == 'true' && '--dry-run' || '' }}
              cd ../openclaw-smart-fetch && npx npm publish --access public ${{ env.DRY_RUN == 'true' && '--dry-run' || '' }}
              ;;
            pi)
              cd packages/pi-smart-fetch && npx npm publish --access public ${{ env.DRY_RUN == 'true' && '--dry-run' || '' }}
              ;;
            openclaw)
              cd packages/openclaw-smart-fetch && npx npm publish --access public ${{ env.DRY_RUN == 'true' && '--dry-run' || '' }}
              ;;
            *)
              echo "Unknown package selection: $SELECTED_PACKAGE" >&2
              exit 1
              ;;
          esac
