name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  package-check:
    runs-on: macos-14
    strategy:
      matrix:
        package:
          - core
          - pi-smart-fetch
          - openclaw-smart-fetch
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check package
        run: cd packages/${{ matrix.package }} && bun run check

  workspace-verify:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: bun run format:check

      - name: Workspace check
        run: bun run check

      - name: Coverage
        run: bun run coverage

      - name: Package dry runs
        run: bun run pack:dry-run:all


  integration:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun run test:integration
